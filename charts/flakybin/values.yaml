replicaCount: 1

image:
  # Built and pushed with ko, e.g.:
  #   KO_DOCKER_REPO=ghcr.io/mikluko/flakybin ko build --bare --tags 0.1.0 .
  repository: ghcr.io/mikluko/flakybin
  pullPolicy: IfNotPresent
  # Defaults to the chart appVersion when empty.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# flakybin is stateless and deterministic; its only knob is access logging.
flakybin:
  # Disable per-request access logging (passes -quiet).
  quiet: false

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: flakybin.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# The binary embeds its assets and writes nothing to disk, so it runs happily
# with a tiny footprint.
resources:
  requests:
    cpu: 10m
    memory: 16Mi
  limits:
    cpu: 200m
    memory: 64Mi

livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}
